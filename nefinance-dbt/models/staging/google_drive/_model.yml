version: 2

models:

  ###########################################################################
  # STOCK PRICES
  ###########################################################################

  - name: stg_sp500_prices
    description: >
      Cleaned and standardized daily stock price data for S&P 500 companies.
      Used as the primary staging model for market price analytics.

    config:
      tags:
        - staging
        - finance
        - market

    columns:

      - name: ticker
        description: Stock ticker symbol.
        tests:
          - not_null

      - name: price_date
        description: Trading date.
        tests:
          - not_null

      - name: open_price
        description: Opening price.

      - name: high_price
        description: Highest trading price.

      - name: low_price
        description: Lowest trading price.

      - name: close_price
        description: Closing price.
      
      - name: adjusted_close_price
        description: adjusted Closing price.

      - name: volume
        description: Daily traded volume.

      - name: fivetran_synced_at
        description: Timestamp when record entered the staging layer.

  ###########################################################################
  # FINANCIAL STATEMENTS
  ###########################################################################

  - name: stg_short_financials
    description: >
      Cleaned staging model for company financial statements loaded from
      Fivetran. One record represents one company's financial snapshot for
      a reporting period.

    columns:

      - name: ticker
        description: Stock ticker symbol.
        tests:
          - not_null

      - name: cik
        description: SEC company identifier.
        tests:
          - not_null

      - name: fiscal_year
        description: Fiscal reporting year.
        tests:
          - not_null

      - name: price
        description: Stock closing price on price_date.

      - name: price_date
        description: Date of stock price.
        tests:
          - not_null

      - name: report_date
        description: Financial statement reporting date.
        tests:
          - not_null

      - name: assets
        description: Total assets.

      - name: assets_current
        description: Current assets.

      - name: cash_and_cash_equivalents
        description: Cash and cash equivalents.

      - name: common_stock_shares_issued
        description: Total shares issued.

      - name: common_stock_value
        description: Common stock value.

      - name: income_tax_expense_benefit
        description: Income tax expense or benefit.

      - name: liabilities_current
        description: Current liabilities.

      - name: operating_income_loss
        description: Operating income or loss.

      - name: stockholders_equity
        description: Shareholders' equity.

      - name: net_income_loss
        description: Net income.

      - name: liabilities
        description: Total liabilities.

      - name: loaded_at
        description: Timestamp when Fivetran loaded the record.
        tests:
          - not_null

  